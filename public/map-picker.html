<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #map { width: 100%; height: 100%; overflow: hidden; }

    #locate-btn {
      position: absolute;
      bottom: 80px;
      right: 10px;
      z-index: 1000;
      width: 40px;
      height: 40px;
      background: #fff;
      border: 2px solid rgba(0,0,0,.2);
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: 0 2px 6px rgba(0,0,0,.3);
      transition: background .15s;
    }
    #locate-btn:hover { background: #f5f5f5; }
    #locate-btn.loading { animation: pulse .8s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  </style>
</head>
<body>
  <div id="map"></div>
  <button id="locate-btn" title="شوێنی ئێستام">📍</button>

  <script>
    var map, marker;

    function initMap() {
      map = new google.maps.Map(document.getElementById('map'), {
        center: { lat: 36.191161, lng: 44.0035543 },
        zoom: 13,
        mapTypeControl: false,
        streetViewControl: false,
        fullscreenControl: false,
        zoomControlOptions: { position: google.maps.ControlPosition.RIGHT_BOTTOM },
      });

      map.addListener('click', function(e) {
        placeMarker(e.latLng);
      });

      // Listen for flyTo from React parent
      window.addEventListener('message', function(e) {
        if (e.data && e.data.flyTo) {
          var ll = new google.maps.LatLng(e.data.lat, e.data.lng);
          map.panTo(ll);
          map.setZoom(17);
          placeMarker(ll);
        }
      });
    }

    function placeAndPost(ll) {
      window.parent.postMessage({ lat: ll.lat(), lng: ll.lng() }, '*');
    }

    function placeMarker(latLng) {
      if (!marker) {
        marker = new google.maps.Marker({ map: map, draggable: true });
        marker.addListener('dragend', function() {
          placeAndPost(marker.getPosition());
        });
      }
      marker.setPosition(latLng);
      placeAndPost(latLng);
    }

    // Locate me button
    document.getElementById('locate-btn').addEventListener('click', function() {
      var btn = this;
      if (!navigator.geolocation) {
        alert('براوزەرەکەت لۆکەیشن پشتگیری ناکات');
        return;
      }
      btn.classList.add('loading');
      btn.textContent = '⏳';
      navigator.geolocation.getCurrentPosition(
        function(pos) {
          var ll = new google.maps.LatLng(pos.coords.latitude, pos.coords.longitude);
          map.panTo(ll);
          map.setZoom(17);
          placeMarker(ll);
          btn.classList.remove('loading');
          btn.textContent = '📍';
        },
        function(err) {
          btn.classList.remove('loading');
          btn.textContent = '📍';
          alert('تکایە ڕێگەپێدان بدە بە لۆکەیشن — لە بار ئادرەس کلیک بکە لەسەر ئایکۆنی 🔒 و Location بگۆڕە بۆ Allow');
        },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    });
  </script>
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBih-2hAM5QZ3_d40fVYMv_Mqk2ONtCQgQ&callback=initMap&language=ckb" async defer></script>
</body>
</html>
