  <rect x="10" y="48" width="20" height="20" rx="3" fill="#ea580c"/>
  <!-- RONGTA wordmark -->
  <text x="45" y="66" font-family="Impact, 'Arial Black', Arial, Helvetica, sans-serif" font-weight="700" font-size="56" fill="#1a1a2e" letter-spacing="5">RONGTA</text>
  <!-- Technology tagline indicator -->
